<!DOCTYPE html>
<html>
<head>
  <title>Academic Library System</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="topbar">
  <div>
    <p class="brand-kicker">Academic System</p>
    <h1 class="brand-title">Library Management</h1>
  </div>
</header>

<main class="page">

  <section id="loginView" class="view is-active">
    <div class="panel" style="max-width: 400px; margin: auto;">
      <h2>Login</h2>

      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">

      <p id="loginMsg" class="definition"></p>

      <button onclick="login()">Login</button>
      <p class="definition">
        Don’t have an account? <a onclick="showSignup()">Signup</a>
      </p>
    </div>
  </section>

  <section id="signupView" class="view">
    <div class="panel" style="max-width: 400px; margin: auto;">
      <h2>Signup</h2>

      <input id="newEmail" placeholder="Email">
      <input id="newPassword" type="password" placeholder="Password">
      <input id="confirmPassword" type="password" placeholder="Confirm Password">

      <p id="signupMsg" class="definition"></p>

      <button onclick="signup()">Signup</button>
      <p class="definition">
        Already have an account? <a onclick="showLogin()">Login</a>
      </p>
    </div>
  </section>

  <section id="dashboardView" class="view">
    <div class="panel">
      <h2>Dashboard</h2>
      <p id="welcomeText" class="definition"></p>
      <button onclick="logout()">Logout</button>
    </div>
  </section>

</main>

<script>
function setView(id) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("is-active"));
  document.getElementById(id).classList.add("is-active");
}

function showLogin() {
  setView("loginView");
}

function showSignup() {
  setView("signupView");
}

function showDashboard() {
  const user = JSON.parse(localStorage.getItem("user"));
  if (user) {
    document.getElementById("welcomeText").textContent = "Welcome, " + user.email;
  }
  setView("dashboardView");
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("loginMsg");

  const user = JSON.parse(localStorage.getItem("user"));

  if (!email || !password) {
    msg.textContent = "Please fill all fields";
    return;
  }

  if (!user) {
    msg.textContent = "No account found. Please signup.";
    return;
  }

  if (user.email === email && user.password === password) {
    msg.textContent = "";
    showDashboard();
  } else {
    msg.textContent = "Invalid email or password";
  }
}

function signup() {
  const email = document.getElementById("newEmail").value;
  const password = document.getElementById("newPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const msg = document.getElementById("signupMsg");

  if (!email || !password || !confirmPassword) {
    msg.textContent = "All fields are required";
    return;
  }

  if (password !== confirmPassword) {
    msg.textContent = "Passwords do not match";
    return;
  }

  localStorage.setItem("user", JSON.stringify({ email, password }));

  msg.textContent = "Signup successful";
  setTimeout(showLogin, 800);
}

function logout() {
  localStorage.removeItem("user");
  showLogin();
}

const user = localStorage.getItem("user");
if (user) {
  showDashboard();
}
</script>

</body>
</html>
